<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xero MCP Server</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 24px; color: #222; }
    h1 { font-size: 1.5rem; }
    code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 0.9rem; }
    pre { background: #f0f0f0; padding: 16px; border-radius: 8px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>Xero MCP Server</h1>
  <p>This is a <a href="https://modelcontextprotocol.io">Model Context Protocol</a> server for Xero.</p>
  <h2>Connect Claude</h2>
  <p>Add this server to Claude using the MCP endpoint:</p>
  <pre><code>https://x-ero.vercel.app/mcp</code></pre>
  <p>Make sure the following environment variables are configured on the server:</p>
  <ul>
    <li><code>XERO_CLIENT_ID</code></li>
    <li><code>XERO_CLIENT_SECRET</code></li>
  </ul>
</body>
</html>
